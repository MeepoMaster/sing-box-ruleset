name: Split and Update CN IP Rules

on:
  schedule:
    - cron: '50 0,8,16 * * *'
  workflow_dispatch:

jobs:
  update-ips:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4

      - name: 下载、分离并执行字节级截断
        run: |
          # 1. 下载原始数据
          curl -sSL https://raw.githubusercontent.com/DustinWin/ruleset_geodata/mihomo-ruleset/cnip.list -o cnip_raw.txt
          
          # 2. 提取 IPv4 和 IPv6
          grep "\." cnip_raw.txt > cn_ip.txt
          grep ":" cnip_raw.txt > cn_ipv6.txt
          
          # 3. 字节级强制剔除末尾换行符
          python3 -c "
          for f in ['cn_ip.txt', 'cn_ipv6.txt']:
              with open(f, 'rb') as file:
                  data = file.read()
              with open(f, 'wb') as file:
                  # rstrip() 会剥离末尾所有的空白符、\r 和 \n
                  file.write(data.rstrip())
          "
          
          # 4. 清理临时文件
          rm cnip_raw.txt

      - name: 提交并推送到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add cn_ip.txt cn_ipv6.txt
          
          if git diff-index --quiet HEAD --; then
            echo "IP 列表无变化，跳过提交。"
          else
            git commit -m "Auto-update CN IP lists [skip ci]"
            git push
          fi
