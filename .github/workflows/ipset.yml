name: Split and Update CN IP Rules (Zero EOF)

on:
  schedule:
    - cron: '50 0,8,16 * * *'
  workflow_dispatch:

jobs:
  update-ips:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4

      - name: 下载、分离并以无尾行模式重组
        run: |
          curl -sSL https://raw.githubusercontent.com/DustinWin/ruleset_geodata/mihomo-ruleset/cnip.list -o cnip_raw.txt
          
          # 使用 awk 重组 IPv4：不输出末尾换行符
          grep "\." cnip_raw.txt | awk 'NR==1 {printf "%s", $0} NR>1 {printf "\n%s", $0}' > cn_ip.txt
          
          # 使用 awk 重组 IPv6：不输出末尾换行符
          grep ":" cnip_raw.txt | awk 'NR==1 {printf "%s", $0} NR>1 {printf "\n%s", $0}' > cn_ipv6.txt
          
          # 锁定文件属性，警告 Git 绝对不许在提交时自作主张加空行
          echo "cn_ip.txt -text" > .gitattributes
          echo "cn_ipv6.txt -text" >> .gitattributes
          
          # 清理临时文件
          rm cnip_raw.txt

      - name: 提交并推送到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add cn_ip.txt cn_ipv6.txt .gitattributes
          
          if git diff-index --quiet HEAD --; then
            echo "IP 列表无变化，跳过提交。"
          else
            git commit -m "Auto-update CN IP lists (Strict no-EOF) [skip ci]"
            git push
          fi
