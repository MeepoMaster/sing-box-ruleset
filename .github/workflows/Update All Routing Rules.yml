name: Update All Routing Rules

on:
  schedule:
    - cron: '30 0,8,16 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'source/emby.json'
      - 'source/block.txt'
      - 'source/noblock.txt'
      - 'source/process.txt'
      - 'source/cn.txt'

env:
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  update-all-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 1. 检出代码仓库
      uses: actions/checkout@v4

    - name: 2. 安装系统基础依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y jq wget tar gzip curl

    - name: 3. 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: 4. 安装 Sing-box
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        LATEST_VERSION=$(curl -sfL -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name)
        VERSION_NUM=${LATEST_VERSION#v}
        wget https://github.com/SagerNet/sing-box/releases/download/${LATEST_VERSION}/sing-box-${VERSION_NUM}-linux-amd64.tar.gz
        tar -xzvf sing-box-${VERSION_NUM}-linux-amd64.tar.gz
        sudo mv sing-box-${VERSION_NUM}-linux-amd64/sing-box /usr/local/bin/
        sing-box version

    - name: 5. 安装 Mihomo
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        MIHOMO_LATEST=$(curl -sfL -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r .tag_name)
        wget -O mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_LATEST}/mihomo-linux-amd64-compatible-${MIHOMO_LATEST}.gz"
        gzip -d mihomo.gz
        sudo mv mihomo /usr/local/bin/
        sudo chmod +x /usr/local/bin/mihomo
        mihomo -v

    - name: 6. 自动整理本地源文件
      run: |
        for f in source/block.txt source/noblock.txt source/process.txt; do
          if [ -f "$f" ]; then sed -i '/^[[:space:]]*$/d' "$f"; sort -u -o "$f" "$f"; fi
        done
        python3 -c '
        import os
        if os.path.exists("source/cn.txt"):
            d, s, m = set(), set(), "suffix"
            for l in open("source/cn.txt", "r", encoding="utf-8"):
                v = l.strip()
                if not v: continue
                if "domain:" in v.lower(): m = "domain"
                elif "domain_suffix:" in v.lower(): m = "suffix"
                else: (d.add(v) if m == "domain" else s.add(v))
            with open("source/cn.txt", "w", encoding="utf-8") as f:
                if d: f.write("domain:\n")
                [f.write(f"{i}\n") for i in sorted(d)]
                if d and s: f.write("\n")
                if s: f.write("domain_suffix:\n")
                [f.write(f"{i}\n") for i in sorted(s)]
        '

    - name: 7. 处理 Emby 规则
      run: |
        jq ".rules[0].domain_suffix |= sort" source/emby.json > t.json && mv t.json source/emby.json

    - name: 8. 处理 adg-awa 规则
      run: |
        curl -sfL -o awa.json https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Singbox.json
        nb=$(jq -R -s -c "split(\"\n\")[:-1]" source/noblock.txt)
        bl=$(jq -R -s -c "split(\"\n\")[:-1]" source/block.txt)
        jq --argjson nb "$nb" ".rules[0].domain |= map(select(. as \$d | \$nb | index(\$d) | not)) | .rules[0].domain_keyword |= map(select(. as \$d | \$nb | index(\$d) | not)) | .rules[0].domain_suffix |= map(select(. as \$d | \$nb | index(\$d) | not))" awa.json > c.json
        jq --argjson bl "$bl" ".rules[0].domain += \$bl" c.json | jq ".rules[0].domain |= (unique|sort) | .rules[0].domain_keyword |= (unique|sort) | .rules[0].domain_suffix |= (unique|sort)" > source/adg-awa.json
        rm awa.json c.json

    - name: 9. 处理 adg-dns 规则
      run: |
        curl -sfL -o s1.json https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblocksingbox.json
        curl -sfL -o s2.json https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Singbox.json
        python3 -c '
        import json, os
        ks, md = ["domain", "domain_suffix", "domain_keyword", "domain_regex", "ip_cidr"], {}
        for k in ks: md[k] = set()
        nob = set(l.strip() for l in open("source/noblock.txt")) if os.path.exists("source/noblock.txt") else set()
        blo = set(l.strip() for l in open("source/block.txt")) if os.path.exists("source/block.txt") else set()
        for f in ["s1.json", "s2.json"]:
            try:
                for r in json.load(open(f))["rules"]:
                    for k in ks: (md[k].update(r[k]) if k in r and r[k] else None)
            except: pass
        md["domain_suffix"].update(blo)
        for k in ["domain", "domain_suffix", "domain_keyword"]: md[k] -= nob
        md["domain"] -= (md["domain"] & md["domain_suffix"])
        res = {k: sorted(list(v)) for k, v in md.items() if v}
        json.dump({"version": 3, "rules": [res]}, open("source/adg-dns.json", "w"), indent=2, ensure_ascii=False)
        '
        rm s1.json s2.json

    - name: 10. 处理其他 Sing-box 规则
      run: |
        curl -sfL -o l.json https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblocksingboxlite.json
        jq --argjson nb "$(jq -R -s -c "split(\"\n\")[:-1]" source/noblock.txt)" --argjson bl "$(jq -R -s -c "split(\"\n\")[:-1]" source/block.txt)" ".rules[0].domain_suffix |= (map(select(. as \$d | \$nb | index(\$d) | not)) + \$bl | unique | sort)" l.json > source/adg-dns-lite.json
        curl -sfL -o a.json https://raw.githubusercontent.com/DustinWin/ruleset_geodata/sing-box-ruleset-compatible/applications.json
        jq --argjson p "$(jq -R -s -c "split(\"\n\")[:-1]" source/process.txt)" ".rules[0].process_name += \$p | .rules[0].process_name |= (unique|sort)" a.json > source/app.json
        rm l.json a.json

    - name: 11. 处理 CN 规则
      run: |
        curl -sfL -o c_up.json https://raw.githubusercontent.com/DustinWin/ruleset_geodata/sing-box-ruleset-compatible/cn.json
        python3 -c '
        import os, json
        d, s, m = set(), set(), "suffix"
        for l in open("source/cn.txt"):
            l = l.strip()
            if not l: continue
            if "domain:" in l.lower(): m = "domain"
            elif "domain_suffix:" in l.lower(): m = "suffix"
            else: (d.add(l) if m == "domain" else s.add(l))
        with open("cn_up.json", "r") as f:
            j = json.load(f)
            j["rules"][0]["domain"] = sorted(list(set(j["rules"][0].get("domain", [])) | d))
            j["rules"][0]["domain_suffix"] = sorted(list(set(j["rules"][0].get("domain_suffix", [])) | s))
        json.dump(j, open("source/cn.json", "w"))
        '
        rm c_up.json

    - name: 12. 规则转换与编译
      run: |
        # Sing-box 编译
        for f in emby adg-awa adg-dns adg-dns-lite app cn; do
          if [ -f "source/$f.json" ]; then sing-box rule-set compile --output "$f.srs" "source/$f.json"; fi
        done
        # Mihomo 转换与编译
        python3 -c '
        import os, re, json, urllib.request
        def dl(u, p):
            req = urllib.request.Request(u, headers={"User-Agent": "Mozilla/5.0"})
            with urllib.request.urlopen(req) as r, open(p, "wb") as f: f.write(r.read())
        nob, blo, pro = [set(l.strip() for l in open(f"source/{x}.txt") if l.strip()) for x in ["noblock", "block", "process"]]
        # Emby 转换
        if os.path.exists("source/emby.json"):
            lines = set()
            for r in json.load(open("source/emby.json")).get("rules", []):
                [lines.add(x) for x in r.get("domain", [])]
                [lines.add(f"+.{x}") for x in r.get("domain_suffix", [])]
            with open("source/emby.list", "w") as f: [f.write(f"{l}\n") for l in sorted(lines)]
        def proc(ip, op, is_y, add_b=False, is_a=False, is_c=False):
            if not os.path.exists(ip): return
            rl = open(ip, "r", encoding="utf-8").readlines()
            std, out = False, []
            for ln in rl:
                s = ln.strip()
                if not s or (s.startswith("#") and not is_y): continue
                if is_y and not std:
                    out.append(ln.rstrip()); (std := True if s == "payload:" else False)
                    continue
                dp = re.sub(r"^(?:-\s*)?(?:DOMAIN-SUFFIX,|DOMAIN,|DOMAIN-KEYWORD,|PROCESS-NAME,|IP-CIDR,)?(?:\x27|\x22)?(?:\+\.)?", "", s).strip("\x27\x22 ")
                if dp not in nob: out.append(ln.rstrip())
            cl = any(any(x in l.upper() for x in ["DOMAIN,", "IP-CIDR,", "PROCESS-NAME,"]) for l in out)
            if add_b: [out.append(f"  - DOMAIN-SUFFIX,{b}" if is_y and cl else (f"  - \x27+.{b}\x27" if is_y else (f"DOMAIN-SUFFIX,{b}" if cl else f"+.{b}"))) for b in blo]
            if is_a: [out.append(f"PROCESS-NAME,{p}") for p in pro]
            if is_c:
                m = "suffix"
                for l in open("source/cn.txt"):
                    v = l.strip()
                    if not v: continue
                    if "domain:" in v.lower(): m = "domain"
                    elif "domain_suffix:" in v.lower(): m = "suffix"
                    else: out.append((f"DOMAIN,{v}" if m=="domain" else f"DOMAIN-SUFFIX,{v}") if cl else (v if m=="domain" else f"+.{v}"))
            with open(op, "w", encoding="utf-8") as f: [f.write(f"{l}\n") for l in sorted(list(set(out)) if not is_y else out)]
        dl("https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.yaml", "aw.y")
        proc("aw.y", "source/adg-awa.yaml", True, True)
        dl("https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblockmihomo.yaml", "dn.y")
        proc("dn.y", "source/adg-dns.yaml", True, True)
        dl("https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblockmihomolite.yaml", "lt.y")
        proc("lt.y", "source/adg-dns-lite.yaml", True, True)
        dl("https://raw.githubusercontent.com/DustinWin/ruleset_geodata/mihomo-ruleset/applications.list", "ap.l")
        proc("ap.l", "source/app.list", False, is_a=True)
        dl("https://raw.githubusercontent.com/DustinWin/ruleset_geodata/mihomo-ruleset/cn.list", "cn.l")
        proc("cn.l", "source/cn.list", False, is_c=True)
        '
        for lf in source/*.list source/*.yaml; do
          if [ -f "$lf" ]; then
            fn=$(basename -- "$lf"); base="${fn%.*}"; ext="${fn##*.}"
            if grep -qiE "DOMAIN,|IP-CIDR,|PROCESS-NAME," "$lf"; then cp "$lf" ./"$fn"; continue; fi
            mihomo convert-ruleset "domain" "$([ "$ext" = "list" ] && echo "text" || echo "yaml")" "$lf" "$base.mrs"
            [ "$base" = "app" ] && cp "$lf" ./app.list
          fi
        done

    - name: 13. 提交推送
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add source/*.txt source/*.json source/*.list source/*.yaml *.srs *.mrs *.list *.yaml
        git commit -m "chore: auto-update" || echo "No changes"
        git push
