name: Test Mihomo Rules Conversion

on:
  # 1. 每天定时运行（北京时间 8:30, 16:30, 0:30）
  schedule:
    - cron: '40 0,8,16 * * *'
  # 2. 支持在 GitHub Actions 页面手动点击触发
  workflow_dispatch:
  # 3. 当你修改本地核心配置并推送到仓库时，立刻触发更新
  push:
    branches:
      - main  # 如果你的默认分支叫 master，请修改为 master
    paths:
      # 只监听纯手工维护的源文件，完美避开 Action 自身生成的 json 导致的死循环
      - 'source/emby.json'
      - 'source/block.txt'
      - 'source/noblock.txt'
      - 'source/process.txt'
      - 'source/cn.txt'

env:
  TZ: Asia/Shanghai

jobs:
  test-mihomo-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 1. 检出代码仓库
      uses: actions/checkout@v4

    - name: 2. 安装系统基础依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gzip curl jq

    - name: 3. 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: 4. 安装 Mihomo 内核
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        MIHOMO_LATEST=$(curl -sfL -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r .tag_name)
        echo "Installing mihomo version: $MIHOMO_LATEST"
        wget -O mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_LATEST}/mihomo-linux-amd64-compatible-${MIHOMO_LATEST}.gz"
        gzip -d mihomo.gz
        sudo mv mihomo /usr/local/bin/
        sudo chmod +x /usr/local/bin/mihomo
        mihomo -v

    - name: 5. 纯文本格式化本地数据
      run: |
        for txt_file in source/block.txt source/noblock.txt source/process.txt; do
          if [ -f "$txt_file" ]; then
            sed -i '/^[[:space:]]*$/d' "$txt_file"
            sort -u -o "$txt_file" "$txt_file"
          fi
        done

    - name: 6. 处理并转换 Mihomo (List / YAML) 规则
      run: |
        python -c '
        import os, re, json, urllib.request

        def download(url, path):
            try:
                req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                with urllib.request.urlopen(req) as resp, open(path, "wb") as f:
                    f.write(resp.read())
            except Exception as e:
                print(f"Download failed {url}: {e}")

        def load_lines(path):
            if not os.path.exists(path): return set()
            with open(path, "r", encoding="utf-8") as f:
                return {line.strip() for line in f if line.strip()}

        noblock = load_lines("source/noblock.txt")
        block = load_lines("source/block.txt")
        process = load_lines("source/process.txt")

        if os.path.exists("source/emby.json"):
            try:
                with open("source/emby.json", "r") as f:
                    emby_data = json.load(f)
                emby_lines = set()
                has_keyword = any(r.get("domain_keyword") for r in emby_data.get("rules", []))
                for r in emby_data.get("rules", []):
                    if has_keyword:
                        for d in r.get("domain", []): emby_lines.add(f"DOMAIN,{d}")
                        for d in r.get("domain_suffix", []): emby_lines.add(f"DOMAIN-SUFFIX,{d}")
                        for d in r.get("domain_keyword", []): emby_lines.add(f"DOMAIN-KEYWORD,{d}")
                    else:
                        for d in r.get("domain", []): emby_lines.add(d)
                        for d in r.get("domain_suffix", []): emby_lines.add(f"+.{d}")
                with open("source/emby.list", "w") as f:
                    for line in sorted(emby_lines): f.write(f"{line}\n")
                print("Converted emby.json to emby.list")
            except: pass

        def process_mihomo_file(in_path, out_path, is_yaml, add_blocks=False, is_app=False, is_cn=False):
            if not os.path.exists(in_path): return
            with open(in_path, "r", encoding="utf-8") as f: raw_lines = f.readlines()
            payload_started, out_lines = False, []
            for line in raw_lines:
                stripped = line.strip()
                if not stripped or (stripped.startswith("#") and not is_yaml): continue
                if is_yaml and not payload_started:
                    out_lines.append(line.rstrip())
                    if stripped == "payload:": payload_started = True
                    continue
                domain_part = re.sub(r"^(?:-\s*)?(?:DOMAIN-SUFFIX,|DOMAIN,|DOMAIN-KEYWORD,|PROCESS-NAME,|IP-CIDR,)?(?:\x27|\x22)?(?:\+\.)?", "", stripped).strip("\x27\x22 ")
                if domain_part in noblock: continue
                out_lines.append(line.rstrip())

            is_classical = any(any(x in ln.upper() for x in ["DOMAIN,", "DOMAIN-SUFFIX,", "DOMAIN-KEYWORD,", "IP-CIDR,", "PROCESS-NAME,"]) for ln in out_lines)

            if add_blocks:
                for b in block:
                    if is_yaml: out_lines.append(f"  - DOMAIN-SUFFIX,{b}" if is_classical else f"  - \x27+.{b}\x27")
                    else: out_lines.append(f"DOMAIN-SUFFIX,{b}" if is_classical else f"+.{b}")
            if is_app:
                for p in process: out_lines.append(f"PROCESS-NAME,{p}")
            if is_cn and os.path.exists("source/cn.txt"):
                mode = "suffix"
                with open("source/cn.txt", "r", encoding="utf-8") as f:
                    for ln in f:
                        v = ln.strip()
                        if not v: continue
                        if v.lower() in ["domain:", "domain："]: mode = "domain"
                        elif v.lower() in ["domain_suffix:", "domain_suffix："]: mode = "suffix"
                        else:
                            if is_classical: out_lines.append(f"DOMAIN,{v}" if mode == "domain" else f"DOMAIN-SUFFIX,{v}")
                            else: out_lines.append(v if mode == "domain" else f"+.{v}")
            if is_yaml:
                header, body = [], set()
                for ln in out_lines:
                    if not ln.lstrip().startswith("-"): header.append(ln)
                    else: body.add(ln)
                out_lines = header + sorted(list(body))
            else: out_lines = sorted(list(set(out_lines)))
            with open(out_path, "w", encoding="utf-8") as f:
                for ln in out_lines: f.write(f"{ln}\n")
        
        # 下载并转换
        download("https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.yaml", "awa.yaml")
        process_mihomo_file("awa.yaml", "source/adg-awa.yaml", True, True)
        download("https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblockmihomo.yaml", "dns.yaml")
        process_mihomo_file("dns.yaml", "source/adg-dns.yaml", True, True)
        download("https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblockmihomolite.yaml", "lite.yaml")
        process_mihomo_file("lite.yaml", "source/adg-dns-lite.yaml", True, True)
        download("https://raw.githubusercontent.com/DustinWin/ruleset_geodata/mihomo-ruleset/applications.list", "app.list")
        process_mihomo_file("app.list", "source/app.list", False, is_app=True)
        download("https://raw.githubusercontent.com/DustinWin/ruleset_geodata/mihomo-ruleset/cn.list", "cn.list")
        process_mihomo_file("cn.list", "source/cn.list", False, is_cn=True)
        '

    - name: 7. 编译 Mihomo 二进制文件 (.mrs)
      run: |
        for list_file in source/*.list source/*.yaml; do
          if [ -f "$list_file" ]; then
            filename=$(basename -- "$list_file")
            name="${filename%.*}"
            ext="${filename##*.}"

            # 只要包含经典格式特征，直接拷贝到根目录并跳过 MRS 编译
            if grep -qiE "^[[:space:]]*(-[[:space:]]*)?['\"]?(DOMAIN|IP-CIDR|DOMAIN-SUFFIX|DOMAIN-KEYWORD|PROCESS-NAME)," "$list_file"; then
              echo "⏭️  Skip binary compile for $list_file (Classical format). Copying to root."
              cp "$list_file" ./"$filename"
              continue
            fi

            rule_type="domain"
            format_type="yaml"
            if [ "$ext" = "list" ]; then format_type="text"; fi

            echo "🚀 Compiling $list_file to $name.mrs..."
            mihomo convert-ruleset "$rule_type" "$format_type" "$list_file" "$name.mrs"
            
            # 特别确保 app.list（即便作为 domain 格式）也被复制到根目录
            if [ "$name" = "app" ]; then cp "$list_file" ./app.list; fi
          fi
        done

    - name: 8. 提交并推送结果
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 同时追踪 source 目录和根目录下的产物
        git add source/*.list source/*.yaml *.mrs *.list *.yaml
        
        git commit -m "chore: auto-update mihomo rules and binaries" || echo "No changes to commit"
        git push
