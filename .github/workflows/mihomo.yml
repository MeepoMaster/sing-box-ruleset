name: Update Mihomo Remote Rules

on:
  # 1. 每天定时运行（北京时间 8:30, 16:30, 0:30）
  schedule:
    - cron: '40 0,8,16 * * *'
  # 2. 支持在 GitHub Actions 页面手动点击触发
  workflow_dispatch:
  # 3. 当你修改本地核心配置并推送到仓库时，立刻触发更新
  push:
    branches:
      - main  # 如果你的默认分支叫 master，请修改为 master
    paths:
      # 只监听纯手工维护的源文件，完美避开 Action 自身生成的 json 导致的死循环
      - 'source/emby.json'
      - 'source/block.txt'
      - 'source/noblock.txt'
      - 'source/process.txt'
      - 'source/cn.txt'

env:
  TZ: Asia/Shanghai

jobs:
  test-mihomo-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 1. 检出代码仓库
      uses: actions/checkout@v4

    - name: 2. 安装系统基础依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gzip curl

    - name: 3. 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: 4. 安装 Mihomo 内核 (携带 Token 防止限流)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        MIHOMO_LATEST=$(curl -sfL -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r .tag_name)
        echo "Installing mihomo version: $MIHOMO_LATEST"
        wget -O mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_LATEST}/mihomo-linux-amd64-compatible-${MIHOMO_LATEST}.gz"
        gzip -d mihomo.gz
        sudo mv mihomo /usr/local/bin/
        sudo chmod +x /usr/local/bin/mihomo
        mihomo -v

    - name: 5. 纯文本格式化本地数据
      run: |
        for txt_file in source/block.txt source/noblock.txt source/process.txt; do
          if [ -f "$txt_file" ]; then
            sed -i '/^[[:space:]]*$/d' "$txt_file"
            sort -u -o "$txt_file" "$txt_file"
          fi
        done

    - name: 6. 处理并转换 Mihomo (List / YAML) 规则
      run: |
        python -c '
        import os, re, json
        import urllib.request

        def download(url, path):
            try:
                req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                with urllib.request.urlopen(req) as resp, open(path, "wb") as f:
                    f.write(resp.read())
            except Exception as e:
                print(f"Download failed {url}: {e}")

        def load_lines(path):
            if not os.path.exists(path): return set()
            with open(path, "r", encoding="utf-8") as f:
                return {line.strip() for line in f if line.strip()}

        noblock = load_lines("source/noblock.txt")
        block = load_lines("source/block.txt")
        process = load_lines("source/process.txt")

        # 将 emby.json 直接变成纯域名格式
        if os.path.exists("source/emby.json"):
            try:
                with open("source/emby.json", "r") as f:
                    emby_data = json.load(f)
                emby_lines = set()
                
                has_keyword = any(r.get("domain_keyword") for r in emby_data.get("rules", []))
                
                for r in emby_data.get("rules", []):
                    if has_keyword:
                        for d in r.get("domain", []): emby_lines.add(f"DOMAIN,{d}")
                        for d in r.get("domain_suffix", []): emby_lines.add(f"DOMAIN-SUFFIX,{d}")
                        for d in r.get("domain_keyword", []): emby_lines.add(f"DOMAIN-KEYWORD,{d}")
                    else:
                        for d in r.get("domain", []): emby_lines.add(d)
                        for d in r.get("domain_suffix", []): emby_lines.add(f"+.{d}")
                
                with open("source/emby.list", "w") as f:
                    for line in sorted(emby_lines): f.write(f"{line}\n")
                print("Successfully converted emby.json to emby.list (Pure Domain Format)")
            except Exception as e: 
                pass

        def process_mihomo_file(in_path, out_path, is_yaml, add_blocks=False, is_app=False, is_cn=False):
            if not os.path.exists(in_path): 
                return
            
            with open(in_path, "r", encoding="utf-8") as f: 
                raw_lines = f.readlines()

            payload_started = False
            
            # 1. 探测是否为 Classical 格式
            def check_classical(lines):
                for ln in lines:
                    clean_ln = ln.strip().lstrip("- \x27\x22").upper()
                    if clean_ln.startswith(("DOMAIN,", "DOMAIN-SUFFIX,", "DOMAIN-KEYWORD,", "IP-CIDR,", "PROCESS-NAME,")):
                        return True
                return False
            
            is_classical = check_classical(raw_lines)
            
            # 2. 动态探测上游喜好是否偏向 +.
            use_suffix = False
            if not is_classical:
                for ln in raw_lines:
                    if "+." in ln:
                        use_suffix = True
                        break

            header_lines = []
            domain_map = {}  # 核心字典：去重、上游优先级
            other_lines = []

            # 3. 解析上游并提权剔除 noblock 域名
            for line in raw_lines:
                stripped = line.strip()
                if not stripped: continue
                if stripped.startswith("#") and not is_yaml: continue
                
                if is_yaml and not payload_started:
                    header_lines.append(line.rstrip())
                    if stripped == "payload:": payload_started = True
                    continue

                domain_part = re.sub(r"^(?:-\s*)?(?:DOMAIN-SUFFIX,|DOMAIN,|DOMAIN-KEYWORD,|PROCESS-NAME,|IP-CIDR,)?(?:\x27|\x22)?(?:\+\.)?", "", stripped).strip("\x27\x22 ")
                
                # 【优先级1】：命中 noblock，无情剔除
                if domain_part in noblock:
                    continue

                is_rule = False
                if is_classical:
                    if stripped.lstrip("- \x27\x22").upper().startswith(("DOMAIN", "DOMAIN-SUFFIX", "PROCESS-NAME", "IP-CIDR")):
                        is_rule = True
                else:
                    if is_yaml:
                        if stripped.startswith("-"): is_rule = True
                    else:
                        is_rule = True

                if is_rule:
                    domain_map[domain_part] = line.rstrip() # 【优先级2】：上游规则占位
                else:
                    other_lines.append(line.rstrip())

            # 4. 追加 block.txt
            if add_blocks:
                for b in block:
                    if b in noblock: continue
                    # 【去重】：只有上游没有，才加自定义
                    if b not in domain_map:
                        if is_classical:
                            domain_map[b] = f"  - DOMAIN-SUFFIX,{b}" if is_yaml else f"DOMAIN-SUFFIX,{b}"
                        else:
                            prefix = "+." if use_suffix else ""
                            domain_map[b] = f"  - \x27{prefix}{b}\x27" if is_yaml else f"{prefix}{b}"
            
            # 5. 追加 process.txt
            if is_app:
                for p in process: 
                    other_lines.append(f"PROCESS-NAME,{p}" if not is_yaml else f"  - PROCESS-NAME,{p}")
            
            # 6. 追加 cn.txt (保留用户分类与空行习惯)
            if is_cn and os.path.exists("source/cn.txt"):
                current_mode = "suffix"
                with open("source/cn.txt", "r", encoding="utf-8") as f:
                    for ln in f:
                        v = ln.strip()
                        if not v: continue # 允许空行分隔
                        
                        if v.lower() in ["domain:", "domain："]: 
                            current_mode = "domain"
                        elif v.lower() in ["domain_suffix:", "domain_suffix："]: 
                            current_mode = "suffix"
                        else: 
                            if v in noblock: continue
                            # 【去重】：只有上游没有，才加自定义
                            if v not in domain_map:
                                if is_classical:
                                    r_type = "DOMAIN" if current_mode == "domain" else "DOMAIN-SUFFIX"
                                    domain_map[v] = f"  - {r_type},{v}" if is_yaml else f"{r_type},{v}"
                                else:
                                    prefix = "" if current_mode == "domain" else "+."
                                    domain_map[v] = f"  - \x27{prefix}{v}\x27" if is_yaml else f"{prefix}{v}"

            # 7. 分组排序与合并输出 (纯域名在前，后缀域名在后)
            exact_rules = []
            suffix_rules = []
            
            for val in domain_map.values():
                clean_val = val.lstrip(" -\x27\x22").upper()
                if clean_val.startswith("+.") or clean_val.startswith("DOMAIN-SUFFIX"):
                    suffix_rules.append(val)
                else:
                    exact_rules.append(val)

            sorted_exact = sorted(exact_rules)
            sorted_suffix = sorted(suffix_rules)

            if is_yaml:
                out_lines = header_lines + other_lines + sorted_exact + sorted_suffix
            else:
                out_lines = sorted(list(set(other_lines))) + sorted_exact + sorted_suffix

            with open(out_path, "w", encoding="utf-8") as f:
                for ln in out_lines: f.write(f"{ln}\n")
            
            format_name = "Classical" if is_classical else "Domain"
            print(f"Successfully processed {out_path} (Format: {format_name}, Upstream suffix preference: {use_suffix})")

        download("https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.yaml", "awa_in.yaml")
        process_mihomo_file("awa_in.yaml", "source/adg-awa.yaml", is_yaml=True, add_blocks=True)

        download("https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblockmihomo.yaml", "adg_in.yaml")
        process_mihomo_file("adg_in.yaml", "source/adg-dns.yaml", is_yaml=True, add_blocks=True)

        download("https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblockmihomolite.yaml", "adg_lite_in.yaml")
        process_mihomo_file("adg_lite_in.yaml", "source/adg-dns-lite.yaml", is_yaml=True, add_blocks=True)

        download("https://raw.githubusercontent.com/DustinWin/ruleset_geodata/mihomo-ruleset/applications.list", "app_in.list")
        process_mihomo_file("app_in.list", "source/app.list", is_yaml=False, is_app=True)

        download("https://raw.githubusercontent.com/DustinWin/ruleset_geodata/mihomo-ruleset/cn.list", "cn_in.list")
        process_mihomo_file("cn_in.list", "source/cn.list", is_yaml=False, is_cn=True)
        '

    - name: 7. 编译 Mihomo 二进制文件 (.mrs)
      run: |
        for list_file in source/*.list source/*.yaml; do
          if [ -f "$list_file" ]; then
            filename=$(basename -- "$list_file")
            name="${filename%.*}"
            ext="${filename##*.}"

            # 【修复点】确保在 continue 跳过之前将 app.list 复制到根目录
            if [ "$name" = "app" ]; then 
              cp "$list_file" ./app.list
              echo "📄 Copied $list_file to root directory as app.list"
            fi

            if grep -qiE "^[[:space:]]*(-[[:space:]]*)?['\"]?(DOMAIN|IP-CIDR|DOMAIN-SUFFIX|DOMAIN-KEYWORD|PROCESS-NAME)," "$list_file"; then
              echo "⏭️  Skip compiling $list_file to .mrs (Classical format. Use pure text format instead.)"
              continue
            fi

            rule_type="domain"
            format_type="yaml"
            if [ "$ext" = "list" ]; then format_type="text"; fi

            echo "🚀 Compiling $list_file to $name.mrs..."
            mihomo convert-ruleset "domain" "$format_type" "$list_file" "$name.mrs"
          fi
        done

    - name: 8. 提交并推送测试结果
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 【修复点】：将 *.list 替换为精准的 app.list，防止把临时文件提交上去
        git add source/*.list source/*.yaml *.mrs app.list
        
        git commit -m "test: generate Mihomo lists, yamls and mrs files" || echo "No changes to commit"
        git push
